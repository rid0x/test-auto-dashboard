<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Automation Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #12112a;
      --bg-card: #1a1933;
      --bg-hover: #1f1e3d;
      --bg-elevated: #252447;
      --border: #2a2850;
      --border2: #3d3a6e;
      --text: #f0eeff;
      --text-muted: #b8b4d8;
      --text-dim: #6b658f;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --accent-dim: rgba(249,115,22,0.1);
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.1);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.1);
      --yellow: #f59e0b;
      --yellow-dim: rgba(245,158,11,0.1);
      --blue: #3b82f6;
      --violet: #a855f7;
      --violet-dim: rgba(168,85,247,0.1);
      --orange: #f97316;
      --radius: 6px;
      --radius-sm: 5px;
      --font: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 12px;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(168,85,247,0.035) 0%, transparent 40%),
        radial-gradient(ellipse at 100% 100%, rgba(249,115,22,0.025) 0%, transparent 40%);
    }

    /* --- Header --- */
    .header {
      background: rgba(8,7,22,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 40%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(249,115,22,0.7) 40%, rgba(139,92,246,0.5) 75%, transparent 100%);
      animation: topbar-scan 4s linear infinite;
      will-change: transform;
    }

    @keyframes topbar-scan {
      from { transform: translateX(-100%); }
      to { transform: translateX(calc(100vw + 100%)); }
    }

    .header h1 {
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.04em;
    }

    .header h1 .icon {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(249,115,22,0.8), 0 0 4px rgba(249,115,22,1);
      animation: logo-pulse 2.4s ease-in-out infinite;
      margin-right: 6px;
      flex-shrink: 0;
    }

    @keyframes logo-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(249,115,22,0.8), 0 0 4px rgba(249,115,22,1); }
      50% { box-shadow: 0 0 16px rgba(249,115,22,0.6), 0 0 6px rgba(249,115,22,0.8); }
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* --- Layout --- */
    .layout {
      display: grid;
      grid-template-columns: 228px 1fr;
      min-height: calc(100vh - 52px);
    }

    /* --- Sidebar --- */
    .sidebar {
      background: rgba(8,7,22,0.99);
      border-right: 1px solid rgba(255,255,255,0.05);
      padding: 14px 10px 20px;
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 4px;
    }

    .sidebar-section-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      padding: 18px 12px 6px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px 9px 20px;
      cursor: pointer;
      transition: color 0.14s, background 0.14s;
      border-left: 3px solid transparent;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.32);
      position: relative;
    }

    .sidebar-item:hover {
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.055);
    }

    .sidebar-item.active {
      color: #fff;
      background: rgba(249,115,22,0.11);
      border-left-color: transparent;
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 25%;
      height: 50%;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(249,115,22,0.7);
    }

    .sidebar-item .name {
      font-size: 12px;
      font-weight: 500;
    }

    .sidebar-item .badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      background: rgba(249,115,22,0.18);
      border: 1px solid rgba(249,115,22,0.3);
      border-radius: 4px;
      padding: 1px 7px;
      color: var(--accent);
    }

    .sidebar-item .project-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .sidebar-item .item-left {
      display: flex;
      align-items: center;
    }

    /* --- Main Content --- */
    .main {
      padding: 24px 28px;
      overflow-y: auto;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .main-header h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .main-header .subtitle {
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 4px;
    }

    /* --- Buttons --- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, box-shadow 0.3s, transform 0.3s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--text-muted);
      box-shadow: 0 3px 10px rgba(249,115,22,0.1);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: rgba(249,115,22,0.12);
      border-color: rgba(249,115,22,0.4);
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      width: 80px;
      height: 100%;
      background-image: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.5), rgba(255,255,255,0) 70%);
      top: 0;
      left: -100px;
      opacity: 0.6;
      pointer-events: none;
    }

    .btn-primary:hover {
      background: rgba(249,115,22,0.22);
      border-color: var(--accent);
      box-shadow: 0 4px 14px rgba(249,115,22,0.2);
    }

    .btn-primary:hover::before {
      animation: btn-shine 1.5s ease-out infinite;
    }

    @keyframes btn-shine {
      0% { left: -80px; }
      60% { left: 100%; }
      to { left: 100%; }
    }

    .btn-success {
      background: var(--green-dim);
      border-color: rgba(16,185,129,0.3);
      color: var(--green);
    }

    .btn-danger {
      background: var(--red-dim);
      border-color: rgba(239,68,68,0.3);
      color: var(--red);
    }
    .btn-danger:hover {
      border-color: rgba(239,68,68,0.6);
      box-shadow: 0 3px 10px rgba(239,68,68,0.15);
    }

    .btn-sm { padding: 5px 10px; font-size: 10px; }

    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

    /* --- Cards --- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(249,115,22,0.3) 40%, rgba(139,92,246,0.2) 70%, transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover::before { opacity: 1; }

    .card-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-hover);
    }

    .card-header h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .card-body { padding: 0; }

    /* --- Stats --- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .stat-card .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* --- Area cards grid --- */
    .areas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    .area-card {
      overflow: hidden;
      cursor: pointer;
      height: 160px;
      position: relative;
      border-radius: 6px;
      box-shadow: 0 0 12px 1px rgba(0,0,0,0.7);
      transition: box-shadow 0.3s, transform 0.2s;
    }

    .area-card:hover {
      box-shadow: 0 0 20px 2px rgba(249,115,22,0.25), 0 0 12px 1px rgba(0,0,0,0.7);
      transform: translateY(-2px);
    }

    .area-card .card-circles {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .area-card:hover .card-circles {
      opacity: 1;
    }

    .area-card .card-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(139,92,246,0.65);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      filter: blur(20px);
      animation: card-float 1400ms infinite ease-in-out;
      animation-play-state: paused;
    }

    .area-card:hover .card-circle {
      animation-play-state: running;
    }

    .area-card .card-circle--bottom {
      background: rgba(249,115,22,0.6);
      left: -20px;
      top: -10px;
      width: 110px;
      height: 110px;
      transform: none;
      animation-delay: -800ms;
    }

    .area-card .card-circle--right {
      background: rgba(236,72,153,0.6);
      right: -10px;
      top: 30px;
      left: auto;
      width: 80px;
      height: 80px;
      transform: none;
      animation-delay: -1400ms;
    }

    @keyframes card-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(16px); }
    }

    .area-card .card-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 14px 24px;
      text-align: center;
      box-shadow: 0 0 20px 8px rgba(0,0,0,0.5);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .area-card:hover .card-label {
      opacity: 1;
    }

    .area-card .card-label-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .area-card .card-label-count {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 4px;
    }

    .area-card .card-static-name {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      z-index: 1;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .area-card .card-static-count {
      font-size: 11px;
      color: rgba(249,115,22,0.5);
      font-weight: 600;
      margin-top: 4px;
    }

    .area-card:hover .card-static-name {
      opacity: 0;
    }

    /* --- Progress bar --- */
    .progress-container {
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: none;
    }

    .progress-container.active { display: block; }

    .progress-bar-wrapper {
      background: var(--bg);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
      background: linear-gradient(90deg, var(--accent), var(--green));
      position: relative;
    }

    .progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: bar-shimmer 2.5s infinite;
    }

    @keyframes bar-shimmer {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    .progress-bar-fill.has-failures {
      background: linear-gradient(90deg, var(--accent), var(--red));
    }

    .progress-stats {
      display: flex;
      gap: 16px;
      font-size: 10px;
      color: var(--text-dim);
    }

    .progress-stats .stat { display: flex; align-items: center; gap: 4px; }
    .progress-stats .dot-g { color: var(--green); }
    .progress-stats .dot-r { color: var(--red); }
    .progress-stats .dot-y { color: var(--yellow); }
    .progress-stats .dot-h { color: var(--orange); }

    /* --- Terminal output --- */
    .terminal {
      background: rgba(6,8,16,0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .terminal-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 600;
    }

    .terminal-header .dots { display: flex; gap: 6px; }
    .terminal-header .dot { width: 10px; height: 10px; border-radius: 50%; }
    .terminal-header .dot-red { background: var(--red); }
    .terminal-header .dot-yellow { background: var(--yellow); }
    .terminal-header .dot-green { background: var(--green); }

    .terminal-body {
      padding: 16px;
      font-family: var(--font);
      font-size: 11px;
      line-height: 1.7;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-muted);
    }

    .terminal-body .line-pass { color: var(--green); }
    .terminal-body .line-fail { color: var(--red); }
    .terminal-body .line-skip { color: var(--yellow); }
    .terminal-body .line-info { color: var(--blue); }
    .terminal-body .line-heal { color: var(--orange); }

    /* --- Status indicator --- */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-idle { background: var(--text-dim); }
    .status-running { background: var(--yellow); animation: pulse 1s infinite; }
    .status-passed { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .status-failed { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.5); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* --- Toggle --- */
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
    }

    .toggle-switch {
      width: 32px; height: 18px;
      background: var(--border);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s;
      cursor: pointer;
    }
    .toggle-switch.active { background: var(--accent); }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle-switch.active::after { transform: translateX(14px); }

    /* --- Welcome screen --- */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      text-align: center;
    }
    .welcome .big-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .welcome h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.04em; }
    .welcome p { color: var(--text-dim); font-size: 12px; max-width: 360px; line-height: 1.6; }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* --- Test details table --- */
    .test-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .test-table thead th {
      padding: 11px 16px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      border-bottom: 2px solid rgba(249,115,22,0.2);
      text-align: left;
      white-space: nowrap;
      background: rgba(8,7,22,0.8);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .test-table tbody tr {
      transition: background 0.12s;
    }
    .test-table tbody tr:nth-child(odd) {
      background: rgba(255,255,255,0.015);
    }
    .test-table tbody tr:nth-child(even) {
      background: rgba(0,0,0,0.1);
    }
    .test-table tbody tr:hover {
      background: rgba(249,115,22,0.06);
    }
    .test-table tbody tr.row-warning { background: rgba(245,158,11,0.05); }
    .test-table tbody tr.row-warning:hover { background: rgba(245,158,11,0.1); }
    .test-table td {
      padding: 14px 16px;
      font-size: 12px;
      vertical-align: top;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .test-table tbody tr:last-child td { border-bottom: none; }
    .test-table .col-idx { color: var(--text-dim); width: 36px; font-variant-numeric: tabular-nums; text-align: center; }
    .test-table .col-name {
      font-weight: 600;
      min-width: 180px;
      max-width: 260px;
      line-height: 1.5;
      color: var(--text);
    }
    .test-table .col-details { min-width: 340px; }
    .test-table .col-line { color: var(--text-dim); width: 50px; font-size: 11px; }
    .test-table .col-action { text-align: right; width: 90px; }

    .td-details { display: flex; flex-direction: column; gap: 6px; }
    .detail-summary {
      font-size: 12px;
      color: #fff;
      margin-bottom: 4px;
      font-weight: 600;
      line-height: 1.5;
      padding: 5px 10px;
      background: rgba(249,115,22,0.08);
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
    }
    .detail-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 11px;
      line-height: 1.6;
      padding: 3px 0;
    }
    .detail-tag {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
      min-width: 72px;
      justify-content: center;
    }
    .tag-nav { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93bbfd; }
    .tag-loc { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: #d4a5ff; }
    .tag-act { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); color: #fdba74; }
    .tag-chk { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .detail-codes { display: flex; flex-wrap: wrap; gap: 5px; align-items: baseline; }
    .detail-codes code, .td-details code {
      font-family: var(--font);
      font-size: 10px;
      background: rgba(255,255,255,0.07);
      padding: 3px 8px;
      border-radius: 4px;
      color: var(--text);
      word-break: break-all;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .detail-more { font-size: 10px; color: var(--accent); font-weight: 500; }
    .detail-text { color: var(--text-muted); font-size: 11px; line-height: 1.5; }
    .detail-empty { color: var(--text-dim); font-size: 11px; font-style: italic; }
    .warning-icon { cursor: help; margin-left: 6px; color: var(--yellow); font-size: 13px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>
      <span class="icon"></span>
      Test Automation Dashboard
    </h1>
    <div class="header-actions">
      <select id="browser-select" class="btn" style="background:var(--bg-card); cursor:pointer;">
        <option value="chromium">Chrome</option>
        <option value="firefox">Firefox</option>
        <option value="webkit">Safari</option>
        <option value="all">All browsers</option>
      </select>
      <select id="device-select" class="btn" style="background:var(--bg-card); cursor:pointer;">
        <option value="desktop">Desktop</option>
        <option value="mobile">Mobile</option>
        <option value="all">All devices</option>
      </select>
      <label class="toggle-label" id="headed-toggle">
        Headed
        <div class="toggle-switch" id="headed-switch"></div>
      </label>
      <button class="btn btn-primary" id="btn-refresh" onclick="loadProjects()">Odswiez</button>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <!-- Dynamically populated -->
    </nav>

    <div style="display:flex; flex-direction:column; overflow:hidden;">
      <main class="main" id="main-content" style="flex:1; overflow-y:auto;">
        <div class="welcome">
          <div class="big-icon">&#128640;</div>
          <h2>Wybierz projekt</h2>
          <p>Kliknij projekt po lewej stronie, aby zobaczyc testy i uruchomic je.</p>
        </div>
      </main>

      <!-- PERSISTENT TERMINAL — never re-rendered -->
      <div id="persistent-terminal" style="padding: 0 32px 24px 32px;">
        <div class="terminal">
          <div class="terminal-header">
            <div class="dots">
              <div class="dot dot-red"></div>
              <div class="dot dot-yellow"></div>
              <div class="dot dot-green"></div>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="status-dot status-idle" id="run-status-dot"></span>
              <span id="run-status-text" style="font-size:12px; color:var(--text-muted)">Gotowy</span>
              <button class="btn btn-sm btn-danger" id="btn-stop" style="display:none" onclick="stopRun()">Stop</button>
              <button class="btn btn-sm" onclick="clearTerminal()">Wyczysc</button>
            </div>
          </div>
          <div class="progress-container" id="progress-container">
            <div class="progress-bar-wrapper">
              <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
            </div>
            <div class="progress-stats">
              <span class="stat" id="progress-text">0 / 0</span>
              <span class="stat"><span class="dot-g">&#9679;</span> <span id="prog-passed">0</span> passed</span>
              <span class="stat"><span class="dot-r">&#9679;</span> <span id="prog-failed">0</span> failed</span>
              <span class="stat"><span class="dot-y">&#9679;</span> <span id="prog-skipped">0</span> skipped</span>
              <span class="stat" id="prog-heal-stat" style="display:none"><span class="dot-h">&#9679;</span> <span id="prog-healed">0</span> healed</span>
            </div>
          </div>
          <div class="terminal-body" id="terminal-output">Gotowy do uruchomienia testów...\n</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let projects = [];
    let activeProject = null;
    let activeArea = null;
    let headedMode = false;
    let ws = null;
    let currentRunId = null;

    let healCount = 0;

    const AREA_NAMES_PL = {
      'login': 'Logowanie',
      'registration': 'Rejestracja',
      'homepage': 'Strona główna',
      'search': 'Wyszukiwarka',
      'cart': 'Koszyk',
      'checkout': 'Proces zakupowy',
      'product-page': 'Karta produktu',
      'category': 'Kategoria',
      'footer': 'Stopka',
      'configurator': 'Konfigurator',
      'api': 'API',
    };

    // --- WebSocket ---
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}`);

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'run:start') {
          currentRunId = msg.runId;
          healCount = 0;
          appendTerminal(`\n> ${msg.command}\n\n`, 'line-info');
          updateRunStatus('running');
          showProgress(true);
          updateProgress(0, 0, 0, 0, 0);
        }

        if (msg.type === 'run:progress') {
          updateProgress(msg.total, msg.done, msg.passed, msg.failed, msg.skipped);
        }

        if (msg.type === 'run:output') {
          const data = msg.data;
          let cls = '';
          if (data.includes('[AUTO-HEAL]')) { cls = 'line-heal'; healCount++; updateHealCount(healCount); }
          else if (data.match(/^\s*(ok|✓)\s+\d+/m)) cls = 'line-pass';
          else if (data.match(/^\s*(x|✗|×)\s+\d+/m)) cls = 'line-fail';
          else if (data.match(/^\s*-\s+\d+/m)) cls = 'line-skip';
          else if (data.includes('passed') && data.includes('failed')) cls = 'line-fail';
          else if (data.includes('passed')) cls = 'line-pass';
          appendTerminal(data, cls);
        }

        if (msg.type === 'run:complete') {
          const status = msg.exitCode === 0 ? 'passed' : 'failed';
          appendTerminal(
            `\n${status === 'passed' ? '✅' : '❌'} Run finished with exit code ${msg.exitCode}\n`,
            status === 'passed' ? 'line-pass' : 'line-fail'
          );

          // Show report link
          if (msg.reportUrl) {
            appendTerminalHTML(`<a href="${msg.reportUrl}" target="_blank" style="color:var(--accent); text-decoration:underline; font-weight:600;">📊 Otworz raport HTML</a>\n`);
          }

          // Show screenshots if any (failure screenshots)
          if (msg.screenshots && msg.screenshots.length > 0) {
            appendTerminal(`\n📸 Screenshoty (${msg.screenshots.length}):\n`, 'line-info');
            for (const src of msg.screenshots) {
              appendTerminalHTML(`<div style="margin:8px 0;"><a href="${src}" target="_blank"><img src="${src}" style="max-width:600px; max-height:300px; border-radius:8px; border:1px solid #2d3148;" /></a></div>`);
            }
          }

          updateRunStatus(status);
          currentRunId = null;
          if (msg.project) loadLastResults(msg.project);
        }
      };

      ws.onclose = () => {
        setTimeout(connectWS, 2000);
      };
    }

    // --- API ---
    async function loadProjects() {
      const res = await fetch('/api/projects');
      projects = await res.json();
      renderSidebar();

      if (activeProject) {
        const updated = projects.find(p => p.name === activeProject.name);
        if (updated) showProject(updated);
      }
    }

    async function loadLastResults(projectName) {
      try {
        const res = await fetch(`/api/results/${projectName}`);
        if (res.ok) {
          return await res.json();
        }
      } catch {}
      return null;
    }

    // --- Render: Sidebar ---
    function renderSidebar() {
      const sb = document.getElementById('sidebar');
      let html = '<div class="sidebar-section"><div class="sidebar-section-title">Projekty</div>';

      for (const project of projects) {
        const isActive = activeProject && activeProject.name === project.name;

        html += `
          <div class="sidebar-item ${isActive ? 'active' : ''}" onclick="showProject(findProject('${project.name}'))">
            <span class="name">${project.displayName}</span>
            <span class="badge">${project.totalTests}</span>
          </div>`;
      }

      html += '</div>';
      sb.innerHTML = html;
    }

    function findProject(name) {
      return projects.find(p => p.name === name);
    }

    // --- Render: Project Overview ---
    function showProject(project) {
      activeProject = project;
      activeArea = null;
      renderSidebar();

      const main = document.getElementById('main-content');

      let html = `
        <div class="main-header">
          <div>
            <h2>${project.displayName}</h2>
            <div class="subtitle">${project.totalTests} testów w ${project.areas.length} obszarach</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" onclick="runTests('${project.name}', 'all')">
              Uruchom wszystkie
            </button>
            <button class="btn" onclick="runTests('${project.name}', 'e2e')">
              Tylko E2E
            </button>
            <button class="btn" onclick="runTests('${project.name}', 'api')">
              Tylko API
            </button>
            <button class="btn" onclick="showHistory('${project.name}')">
              Historia
            </button>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${project.totalTests}</div>
            <div class="stat-label">Wszystkie testy</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${project.areas.length}</div>
            <div class="stat-label">Obszary testowe</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${project.areas.filter(a => a.name !== 'api').length}</div>
            <div class="stat-label">Obszary E2E</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="last-run-status">-</div>
            <div class="stat-label">Ostatni run</div>
          </div>
        </div>

        <h3 style="margin-bottom: 16px; font-size: 18px;">Obszary testowe</h3>
        <div class="areas-grid">`;

      for (const area of project.areas) {
        const plName = AREA_NAMES_PL[area.name] || area.displayName;
        html += `
          <div class="area-card" onclick="showArea(findProject('${project.name}'), '${area.name}')">
            <div class="card-static-name">${plName}<div class="card-static-count">${area.testCount} testów</div></div>
            <div class="card-circles">
              <div class="card-circle"></div>
              <div class="card-circle card-circle--bottom"></div>
              <div class="card-circle card-circle--right"></div>
            </div>
            <div class="card-label">
              <div class="card-label-name">${plName}</div>
              <div class="card-label-count">${area.testCount} testów</div>
            </div>
          </div>`;
      }

      html += `</div>`;
      main.innerHTML = html;
    }

    // --- Render: Area Detail ---
    function showArea(project, areaName) {
      activeProject = project;
      const area = project.areas.find(a => a.name === areaName);
      if (!area) return;
      activeArea = area;
      renderSidebar();

      const main = document.getElementById('main-content');
      const plName = AREA_NAMES_PL[area.name] || area.displayName;

      let html = `
        <div class="main-header">
          <div>
            <h2>${plName}</h2>
            <div class="subtitle">${project.displayName} &bull; ${area.testCount} testów &bull; ${area.specFile}</div>
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" onclick="runTests('${project.name}', '${area.name}')">
              Uruchom obszar
            </button>
            <button class="btn" onclick="showProject(findProject('${project.name}'))">
              Wstecz
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Testy (${area.testCount})</h3>
            <span style="font-size:12px; color:var(--text-muted)">${area.specFile}</span>
          </div>
          <div class="card-body">
            <table class="test-table">
              <thead>
                <tr>
                  <th style="text-align:center;">#</th>
                  <th>Nazwa testu</th>
                  <th>Co sprawdza</th>
                  <th>Linia</th>
                  <th style="text-align:right;">Akcja</th>
                </tr>
              </thead>
              <tbody>`;

      area.tests.forEach((t, i) => {
        const rowCls = t.warning ? 'row-warning' : '';
        const warningIcon = t.warning
          ? `<span class="warning-icon" title="${escapeHtml(t.warning)}">&#9888;</span>`
          : '';

        // Build rich details HTML
        let detailsHtml = '';
        const d = t.details;
        const hasDetails = d && (d.navigations.length || d.selectors.length || d.assertions.length || d.actions.length);

        if (hasDetails) {
          detailsHtml = '<div class="td-details">';

          if (t.description) {
            detailsHtml += `<div class="detail-summary">${escapeHtml(t.description)}</div>`;
          }

          if (d.navigations.length > 0) {
            detailsHtml += `<div class="detail-line"><span class="detail-tag tag-nav">nawigacja</span><span class="detail-codes">${d.navigations.map(n => '<code>' + escapeHtml(n) + '</code>').join('')}</span></div>`;
          }

          if (d.selectors.length > 0) {
            const shown = d.selectors.slice(0, 6);
            const more = d.selectors.length > 6 ? '<span class="detail-more">+' + (d.selectors.length - 6) + ' więcej</span>' : '';
            detailsHtml += `<div class="detail-line"><span class="detail-tag tag-loc">lokator</span><span class="detail-codes">${shown.map(s => '<code>' + escapeHtml(s) + '</code>').join('')}${more}</span></div>`;
          }

          if (d.actions.length > 0) {
            detailsHtml += `<div class="detail-line"><span class="detail-tag tag-act">akcja</span><span class="detail-text">${d.actions.map(a => escapeHtml(a)).join(', ')}</span></div>`;
          }

          if (d.assertions.length > 0) {
            const shownA = d.assertions.slice(0, 5);
            const moreA = d.assertions.length > 5 ? ', <span class="detail-more">+' + (d.assertions.length - 5) + ' więcej</span>' : '';
            detailsHtml += `<div class="detail-line"><span class="detail-tag tag-chk">sprawdza</span><span class="detail-text">${shownA.map(a => escapeHtml(a)).join(', ')}${moreA}</span></div>`;
          }

          detailsHtml += '</div>';
        } else {
          detailsHtml = t.description
            ? `<div class="td-details"><div class="detail-summary">${escapeHtml(t.description)}</div></div>`
            : '<span class="detail-empty">fixture / page-object</span>';
        }

        html += `
                <tr class="${rowCls}">
                  <td class="col-idx">${i + 1}</td>
                  <td class="col-name">${escapeHtml(t.name)}${warningIcon}</td>
                  <td class="col-details">${detailsHtml}</td>
                  <td class="col-line">:${t.line}</td>
                  <td class="col-action">
                    <button class="btn btn-sm" onclick="event.stopPropagation(); runTests('${project.name}', '${area.name}', '${escapeAttr(t.name)}')">
                      Uruchom
                    </button>
                  </td>
                </tr>`;
      });

      html += `
              </tbody>
            </table>
          </div>
        </div>`;

      main.innerHTML = html;
    }

    // --- Terminal (persistent — lives outside main-content) ---
    function appendTerminal(text, cls) {
      const term = document.getElementById('terminal-output');
      if (!term) return;

      if (cls) {
        const span = document.createElement('span');
        span.className = cls;
        span.textContent = text;
        term.appendChild(span);
      } else {
        term.appendChild(document.createTextNode(text));
      }

      term.scrollTop = term.scrollHeight;
    }

    function appendTerminalHTML(html) {
      const term = document.getElementById('terminal-output');
      if (!term) return;
      const div = document.createElement('div');
      div.innerHTML = html;
      term.appendChild(div);

      term.scrollTop = term.scrollHeight;
    }

    function clearTerminal() {
      const term = document.getElementById('terminal-output');
      if (term) term.innerHTML = '';
    }

    function updateRunStatus(status) {
      const dot = document.getElementById('run-status-dot');
      const text = document.getElementById('run-status-text');
      const stopBtn = document.getElementById('btn-stop');
      if (!dot) return;

      dot.className = 'status-dot';
      switch (status) {
        case 'running':
          dot.classList.add('status-running');
          text.textContent = 'Uruchomiony...';
          if (stopBtn) stopBtn.style.display = 'inline-flex';
          break;
        case 'passed':
          dot.classList.add('status-passed');
          text.textContent = 'Przeszedl';
          if (stopBtn) stopBtn.style.display = 'none';
          break;
        case 'failed':
          dot.classList.add('status-failed');
          text.textContent = 'Nie powiodl sie';
          if (stopBtn) stopBtn.style.display = 'none';
          break;
        default:
          dot.classList.add('status-idle');
          text.textContent = 'Gotowy';
          if (stopBtn) stopBtn.style.display = 'none';
      }
    }

    // --- Run / Stop ---
    function runTests(project, area, testName) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('WebSocket nie polaczony. Odswierz strone.');
        return;
      }

      const browser = document.getElementById('browser-select').value;
      const device = document.getElementById('device-select').value;

      clearTerminal();
      ws.send(JSON.stringify({
        type: 'run',
        project,
        area: area === 'all' ? null : area,
        testName: testName || null,
        headed: headedMode,
        browser,
        device,
      }));
    }

    function stopRun() {
      if (ws && currentRunId) {
        ws.send(JSON.stringify({ type: 'stop', runId: currentRunId }));
      }
    }

    // --- Headed toggle ---
    document.getElementById('headed-switch').addEventListener('click', function() {
      headedMode = !headedMode;
      this.classList.toggle('active', headedMode);
    });

    // --- Utils ---
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }

    // --- Progress bar ---
    function showProgress(visible) {
      const el = document.getElementById('progress-container');
      if (el) el.classList.toggle('active', visible);
    }

    function updateProgress(total, done, passed, failed, skipped) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const bar = document.getElementById('progress-bar');
      if (bar) {
        bar.style.width = pct + '%';
        bar.className = 'progress-bar-fill' + (failed > 0 ? ' has-failures' : '');
      }
      const txt = document.getElementById('progress-text');
      if (txt) txt.textContent = `${done} / ${total} (${pct}%)`;
      const pp = document.getElementById('prog-passed');
      if (pp) pp.textContent = passed;
      const pf = document.getElementById('prog-failed');
      if (pf) pf.textContent = failed;
      const ps = document.getElementById('prog-skipped');
      if (ps) ps.textContent = skipped;
    }

    function updateHealCount(count) {
      const el = document.getElementById('prog-heal-stat');
      if (el && count > 0) el.style.display = 'flex';
      const num = document.getElementById('prog-healed');
      if (num) num.textContent = count;
    }

    // --- History ---
    async function showHistory(projectName) {
      activeProject = projects.find(p => p.name === projectName) || activeProject;
      activeArea = null;
      renderSidebar();

      const res = await fetch(`/api/history/${projectName}`);
      const history = await res.json();

      const main = document.getElementById('main-content');
      let html = `
        <div class="main-header">
          <div>
            <h2>Historia runow</h2>
            <div class="subtitle">${activeProject?.displayName || projectName} &bull; ${history.length} runow</div>
          </div>
          <div class="btn-group">
            <button class="btn" onclick="showProject(findProject('${projectName}'))">Wstecz</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>Ostatnie runy</h3>
          </div>
          <div class="card-body">
            <table style="width:100%; border-collapse:collapse;">
              <thead>
                <tr style="border-bottom:1px solid var(--border); text-align:left;">
                  <th style="padding:12px 16px; font-size:12px; color:var(--text-muted); font-weight:600;">Data</th>
                  <th style="padding:12px 8px; font-size:12px; color:var(--text-muted); font-weight:600;">Obszar</th>
                  <th style="padding:12px 8px; font-size:12px; color:var(--text-muted); font-weight:600;">Env</th>
                  <th style="padding:12px 8px; font-size:12px; color:var(--text-muted); font-weight:600;">Wynik</th>
                  <th style="padding:12px 8px; font-size:12px; color:var(--text-muted); font-weight:600;">Czas</th>
                  <th style="padding:12px 8px; font-size:12px; color:var(--text-muted); font-weight:600;">Healing</th>
                  <th style="padding:12px 16px; font-size:12px; color:var(--text-muted); font-weight:600; text-align:right;">Raport</th>
                </tr>
              </thead>
              <tbody>`;

      if (history.length === 0) {
        html += `<tr><td colspan="7" style="padding:24px 16px; color:var(--text-muted); text-align:center;">Brak historii runow. Uruchom testy zeby zobaczyc wyniki.</td></tr>`;
      }

      for (const run of history) {
        const date = new Date(run.date);
        const dateStr = date.toLocaleDateString('pl-PL') + ' ' + date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
        const areaLabel = run.testName ? run.testName.substring(0, 40) : (run.area || 'all');
        const envLabel = `${run.browser || 'chrome'} / ${run.device || 'desktop'}`;
        const duration = run.duration ? (run.duration / 1000).toFixed(1) + 's' : '-';
        const statusColor = run.failed > 0 ? 'var(--red)' : (run.skipped > 0 && run.passed === 0 ? 'var(--yellow)' : 'var(--green)');
        const statusIcon = run.failed > 0 ? '&#10060;' : (run.passed > 0 ? '&#9989;' : '&#9888;');
        const healCount = run.healingEvents?.length || 0;

        html += `
                <tr style="border-bottom:1px solid var(--border);">
                  <td style="padding:10px 16px; font-size:13px; color:var(--text-muted);">${dateStr}</td>
                  <td style="padding:10px 8px; font-size:13px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(areaLabel)}">${escapeHtml(areaLabel)}</td>
                  <td style="padding:10px 8px; font-size:12px; color:var(--text-muted);">${envLabel}</td>
                  <td style="padding:10px 8px; font-size:13px;">
                    <span style="color:${statusColor}">${statusIcon}</span>
                    <span style="color:var(--green)">${run.passed || 0}P</span>
                    <span style="color:var(--red)">${run.failed || 0}F</span>
                    <span style="color:var(--yellow)">${run.skipped || 0}S</span>
                  </td>
                  <td style="padding:10px 8px; font-size:13px; color:var(--text-muted);">${duration}</td>
                  <td style="padding:10px 8px; font-size:13px; color:${healCount > 0 ? 'var(--orange)' : 'var(--text-muted)'};">${healCount > 0 ? healCount + ' healed' : '-'}</td>
                  <td style="padding:10px 16px; text-align:right;">
                    ${run.reportUrl ? `<a href="${run.reportUrl}" target="_blank" class="btn btn-sm">Raport</a>` : '-'}
                  </td>
                </tr>`;
      }

      html += `
              </tbody>
            </table>
          </div>
        </div>`;

      main.innerHTML = html;
    }

    // --- Init ---
    connectWS();
    loadProjects();
  </script>
</body>
</html>
